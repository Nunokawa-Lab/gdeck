# GoReleaser の設定ファイル形式のバージョン。現在の主流フォーマット指定。
version: 2

project_name: gdeck

# ビルド前の処理指定
before:
  hooks:
    - go mod tidy

builds:
  - id: gdeck   # ビルド識別子
    main: .   # エントリーポイント
    binary: gdeck   # 出力される実行ファイル名
    env:
      - CGO_ENABLED=0   # C言語連携を無効化
    goos:   # コンパイル対象OS
      - darwin
      - linux
      - windows
    goarch:   # 対象CPU
      - amd64
      - arm64

# 配布ファイルの形式指定
archives:
  - id: default
    formats:
      - binary    # バイナリを配布（zip等にはしない）
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Nunokawa-Lab
    name: gdeck
  draft: false
  prerelease: auto   # v0.1.0-beta.1 などハイフン以降があればprerelease扱い

# Homebrew tap（homebrew-gdeck）の Cask を自動更新する設定
# - macOS 専用（Linux は go install または Release バイナリ DL を使う）
# - Release に upload したビルド済みバイナリを配布する（インストール時に Go 不要）
# - タグ push → Release 作成後、別リポジトリの Casks/gdeck.rb を commit & push する
homebrew_casks:
  - name: gdeck
    # 参照する archives（上記 archives セクションの id）
    ids:
      - default
    # Cask に配置する実行ファイル名（builds.binary と一致）
    binaries:
      - gdeck
    # 更新対象の tap リポジトリ（brew tap Nunokawa-Lab/gdeck で使う repo）
    repository:
      owner: Nunokawa-Lab
      name: homebrew-gdeck
      # gdeck 用 GITHUB_TOKEN では tap repo に書き込めないため、別 PAT を使う
      # release.yml の HOMEBREW_TAP_GITHUB_TOKEN → GitHub Secrets に登録した値
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # Cask ファイルの置き場（Formula/ ではなく Casks/）
    directory: Casks
    homepage: "https://github.com/Nunokawa-Lab/gdeck"
    description: "Lightweight API testing tool (CLI + TUI)"
    commit_msg_template: "brew: update {{ .ProjectName }} cask to {{ .Tag }}"
    # Release Assets からバイナリを取得する URL（archives.name_template のファイル名と一致）
    url:
      template: "https://github.com/Nunokawa-Lab/gdeck/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/Nunokawa-Lab/gdeck/"
    # brew info --cask gdeck 等で表示されるメッセージ（Casks/gdeck.rb に毎回埋め込まれる）
    # ※ 各行のインデントを揃えること（YAML の literal block で必須）
    # ※ Ruby heredoc では行末の \ が次行と結合されるため、AA 行末に \ を置かない
    caveats: |
        ____ ____  _____ ____ _  __
        / ___|  _ \\| ____/ ___| |/ /
        | |  _| | | |  _|| |   | ' /
        | |_| | |_| | |__| |___| .
        \\____|____/|_____\\____|_|\\_

        Run `gdeck --help` to get started, or `gdeck tui` for the interactive UI.
    # 署名なしバイナリの Gatekeeper 対策（brew install 直後の起動ブロックを回避）
    # staged されるファイル名は gdeck-darwin-amd64 等（binary の target 名 gdeck ではない）
    hooks:
      post:
        install: |
          if OS.mac?
            Dir.glob("#{staged_path}/*", File::FNM_DOTMATCH).each do |path|
              next unless File.file?(path)
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", path]
            end
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"