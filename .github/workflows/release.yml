name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      # リポジトリのコードを Actions の仮想マシン（ubuntu-latest）に clone
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changelog用。全履歴を取得。GoReleaser が changelog を作るとき「前のタグから今回のタグまでのコミット一覧」が必要なため

      # go環境準備
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # GoReleaser処理
      # - gdeck リポジトリ: Release 作成・全 OS バイナリ upload（GITHUB_TOKEN）
      # - homebrew-gdeck リポジトリ: Casks/gdeck.rb 更新 & push（HOMEBREW_TAP_GITHUB_TOKEN）
      #   ※ Cask は macOS 専用。Release バイナリを tap 経由で配布（Go 不要）
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean   # 前回のビルド成果物を消してからやり直す
        env:
          # この Workflow が動いている gdeck リポジトリへの Release 作成用（Actions が自動発行）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # homebrew-gdeck への push 用（要: リポジトリ Secrets に手動登録）
          # GitHub > gdeck > Secrets > Actions : HOMEBREW_TAP_GITHUB_TOKEN
          # PAT には repo スコープが必要（homebrew-gdeck への write 権限）
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
